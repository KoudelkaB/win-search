name: release

# Pushing a tag like v0.1.0 builds the installer and publishes a GitHub release.
# The tag is the single source of truth for the version: MinVer stamps it into
# the assemblies and the same tag names the installer artifact.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # MinVer needs the tag history

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Derive version from the tag
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          "VERSION=$version" >> $env:GITHUB_ENV

      - name: Publish app
        run: dotnet publish search/search.csproj -c Release -r win-x64 --self-contained true -o publish/app

      - name: Publish service
        run: dotnet publish search.service/search.service.csproj -c Release -r win-x64 --self-contained true -o publish/service

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress }
          & $iscc /DMyAppVersion=$env:VERSION installer\setup.iss

      - name: Generate checksum
        shell: pwsh
        run: |
          $file = "installer/Output/WinSearch-Setup-$env:VERSION.exe"
          $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToUpperInvariant()
          "$hash  WinSearch-Setup-$env:VERSION.exe" | Set-Content installer/Output/SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            installer/Output/WinSearch-Setup-${{ env.VERSION }}.exe
            installer/Output/SHA256SUMS.txt
          generate_release_notes: true
